name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Importer le certificat dans le keychain
        run: |
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASS="temp-keychain-password"
          echo "${{ secrets.MAC_CERT_P12_BASE64 }}" | base64 --decode > "$CERT_PATH"
          echo "Taille P12 : $(wc -c < "$CERT_PATH") octets"
          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${{ secrets.MAC_CERT_PASSWORD }}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH" || true
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          rm "$CERT_PATH"
          echo "--- Identités de signature disponibles ---"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
          IDENTITIES=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep -c "Developer ID Application" || true)
          if [ "$IDENTITIES" -eq 0 ]; then
            echo "ERREUR : aucune identité Developer ID Application trouvée."
            echo "Vérifier MAC_CERT_P12_BASE64 (P12 exporté avec clé privée ?) et MAC_CERT_PASSWORD."
            exit 1
          fi
          echo "OK : $IDENTITIES identité(s) Developer ID Application trouvée(s)"

      - name: Build macOS (.dmg)
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CERT_PASSWORD }}
        run: npx electron-builder --mac --arm64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmg
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Windows (.exe)
        run: npx electron-builder --win --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: win-exe
          path: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build Linux (.AppImage)
        run: npx electron-builder --linux --x64 --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: linux-appimage
          path: dist/*.AppImage

  release:
    needs: [build-mac, build-win, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Créer la release GitHub
        uses: softprops/action-gh-release@v2
        with:
          name: RadioStation CD Ripper ${{ github.ref_name }}
          body: |
            ## RadioStation CD Ripper ${{ github.ref_name }}

            Application autonome pour importer des CD audio dans RadioStation.

            ### Téléchargement
            - **macOS** : `.dmg` — glisser l'app dans Applications
            - **Windows** : `.exe` — installeur standard
            - **Linux** : `.AppImage` — `chmod +x` puis exécuter

            ### Prérequis
            - macOS / Windows : aucun (ffmpeg inclus)
            - Linux : `sudo apt install ffmpeg cdparanoia` (ou via le script `start.sh`)
          files: |
            artifacts/mac-dmg/*.dmg
            artifacts/win-exe/*.exe
            artifacts/linux-appimage/*.AppImage
          draft: false
          prerelease: false
