<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>RadioStation — Import</title>
<link rel="stylesheet" href="/local-ui/style.css">
</head>
<body>
  <header class="topbar">
    <h1 id="page-title">📥 Import</h1>
    <div class="topbar-right">
      <label id="fast-rip-label" class="vocal-toggle" title="Rip plus rapide, sans correction d'erreur/jitter — à réserver aux CD en bon état">
        <input type="checkbox" id="fast-rip-toggle">
        Rip rapide (sans correction d'erreur)
      </label>
      <label class="vocal-toggle" title="Normalise automatiquement chaque piste à -14 LUFS à l'import (CD et fichiers) — le bouton « Normaliser » de l'éditeur reste disponible pour une correction manuelle ponctuelle">
        <input type="checkbox" id="normalize-toggle">
        Normaliser à l'import (-14 LUFS)
      </label>
      <span id="pairing-indicator" class="pairing-indicator"></span>
    </div>
  </header>

  <main id="app">
    <!-- Rempli dynamiquement par app.js selon l'état courant -->
    <p class="loading">Chargement…</p>
  </main>

  <script type="module" src="/local-ui/app.js"></script>
</body>
</html>
